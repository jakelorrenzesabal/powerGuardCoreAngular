<div class="login-bg d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="assets/logo.png" alt="PowerGuard Logo" style="width: 120px; height: auto;" class="mb-3">
            <h2 class="fw-bold mb-1 text-dark">PowerGuard</h2>
            <p class="text-muted">Smart Room Entry System</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-floating mb-3">
                <input type="email" formControlName="email" class="form-control rounded-3" id="floatingInput"
                    [ngClass]="{ 'is-invalid': submitted && f.email.errors }" placeholder="name@example.com">
                <label for="floatingInput">Email address</label>
                <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
                    <div *ngIf="f.email.errors.required">Email is required</div>
                    <div *ngIf="f.email.errors.email">Email is invalid</div>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="password" formControlName="password" class="form-control rounded-3" id="floatingPassword"
                    [ngClass]="{ 'is-invalid': submitted && f.password.errors }" placeholder="Password">
                <label for="floatingPassword">Password</label>
                <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                    <div *ngIf="f.password.errors.required">Password is required</div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                    <label class="form-check-label text-secondary small" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a routerLink="../forgot-password" class="small text-primary text-decoration-none fw-medium">Forgot
                    Password?</a>
            </div>

            <button [disabled]="submitting"
                class="btn btn-primary w-100 btn-lg rounded-3 mb-3 d-flex align-items-center justify-content-center">
                <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                Login
            </button>

            <div class="text-center" *ngIf="canRegister">
                <p class="text-muted small mb-0">Don't have an account?
                    <a routerLink="../register" class="text-primary fw-bold text-decoration-none">Create Account</a>
                </p>
            </div>
        </form>
    </div>
</div>
