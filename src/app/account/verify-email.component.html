<div class="login-bg d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card card shadow-lg border-0" style="max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="assets/logo.png" alt="PowerGuard Logo" class="mb-2"
                    style="width: 70px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                <h2 class="fw-bold mb-1" style="color: #0d6efd;">PowerGuard</h2>
                <div class="text-muted mb-2">Smart Room Entry System</div>
            </div>
            <h4 class="mb-4 text-center">Verify Email</h4>
            <div *ngIf="emailStatus == EmailStatus.Verifying" class="text-center mb-3">
                <span class="spinner-border spinner-border-sm"></span> Verifying...
            </div>
            <div *ngIf="emailStatus == EmailStatus.Failed" class="alert alert-danger text-center mb-3">
                Verification failed, you can also verify your account using the <a routerLink="forgot-password">forgot
                    password</a> page.
            </div>
        </div>
    </div>
</div>
