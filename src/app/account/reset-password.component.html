<div class="login-bg d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card card shadow-lg border-0" style="max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="assets/logo.png" alt="PowerGuard Logo" class="mb-2"
                    style="width: 70px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                <h2 class="fw-bold mb-1" style="color: #0d6efd;">PowerGuard</h2>
                <div class="text-muted mb-2">Smart Room Entry System</div>
            </div>
            <h4 class="mb-4 text-center">Reset Password</h4>
            <div *ngIf="tokenStatus == TokenStatus.Validating" class="text-center mb-3">
                <span class="spinner-border spinner-border-sm"></span> Validating token...
            </div>
            <div *ngIf="tokenStatus == TokenStatus.Invalid" class="alert alert-danger text-center mb-3">
                Token validation failed, if the token has expired you can get a new one at the <a
                    routerLink="../forgot-password">forgot password</a> page.
            </div>
            <form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" formControlName="password" class="form-control"
                        [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
                    <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                        <div *ngIf="f.password.errors.required">Password is required</div>
                        <div *ngIf="f.password.errors.minlength">Password must be at least 6 characters</div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" formControlName="confirmPassword" class="form-control"
                        [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }" />
                    <div *ngIf="submitted && f.confirmPassword.errors" class="invalid-feedback">
                        <div *ngIf="f.confirmPassword.errors.required">Confirm Password is required</div>
                        <div *ngIf="f.confirmPassword.errors.mustMatch">Passwords must match</div>
                    </div>
                </div>
                <div class="mb-2">
                    <button [disabled]="loading" class="btn btn-primary w-100">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                        Reset Password
                    </button>
                    <div class="text-center mt-2">
                        <a routerLink="../login" class="btn btn-link">Back to Login</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
